<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT JOVE 26</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="pantallaPrincipal">
    <div id="total">0.00 €</div>
    <div class="grid" id="gridProductes"></div>
    <div class="accions">
        <button onclick="reiniciar()">🔄</button>
        <button onclick="pagar('Targeta')">💳 Targeta</button>
        <button onclick="pagar('Efectiu')">💰 Efectiu</button>
    </div>
</div>

<div id="pantallaEfectiu">
    <h2 id="display-canvi" class="dades-pagament"></h2>
    <div class="teclat">
        <button class="btn-num" onclick="sumarEfectiu(0.5)">0.5€</button>
        <button class="btn-num" onclick="sumarEfectiu(1)">1€</button>
        <button class="btn-num" onclick="sumarEfectiu(2)">2€</button>
        <button class="btn-num" onclick="sumarEfectiu(5)">5€</button>
        <button class="btn-num" onclick="sumarEfectiu(10)">10€</button>
        <button class="btn-num" onclick="sumarEfectiu(20)">20€</button>
    </div>
    <button style="width:100%; height:80px; margin-top:20px; font-size:24px;" onclick="finalitzar()">Finalitzar Venda</button>
    <button style="width:100%; height:60px; margin-top:10px;" onclick="tornar()">🔙 Enrere</button>
</div>

<script src="script.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registrat correctament'));
  }
</script>

</body>
</html>
