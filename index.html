<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barra Nit Jove</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:white;
}

#pantallaPrincipal{
    display:flex;
    flex-direction:column;
    height:100vh;
    padding:12px;
}

#total{
    font-size:60px;
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}

.grid{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(3,1fr);
    gap:10px;
}

.producte{
    border:none;
    border-radius:15px;
    font-size:28px;
    font-weight:bold;
    color:white;
}

#aigua{background:#2196F3;}
#refresc{background:#FF9800;}
#cervesa{background:#FFC107;color:black;}
#combinat{background:#D32F2F;}
#ratafia{background:#7B1FA2;}
#got{background:#757575;}

.accions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.accions button{
    height:80px;
    font-size:28px;
    border:none;
    border-radius:15px;
    color:white;
}

#targeta{
    background:#4CAF50;
}

#efectiu{
    background:#009688;
}

#reset{
    margin-top:10px;
    width:100%;
    height:70px;
    border:none;
    border-radius:15px;
    background:#444;
    color:white;
    font-size:28px;
}

#pantallaEfectiu{
    display:none;
    height:100vh;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.totalGran{
    text-align:center;
    font-size:60px;
    margin-bottom:20px;
}

input{
    width:100%;
    font-size:45px;
    text-align:center;
    padding:15px;
    margin-bottom:15px;
}

.rapids{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.rapids button{
    height:70px;
    font-size:28px;
}

#calcular{
    width:100%;
    height:80px;
    font-size:30px;
    margin-top:15px;
}

#canvi{
    text-align:center;
    font-size:55px;
    margin-top:20px;
}

#nova{
    width:100%;
    height:80px;
    font-size:28px;
    margin-top:20px;
}

button{
    cursor:pointer;
}

</style>
</head>

<body>

<div id="pantallaPrincipal">

<div id="total">0,00 €</div>

<div class="grid">

<button class="producte" id="aigua" onclick="afegir(1)">
💧<br>Aigua<br>1€
</button>

<button class="producte" id="refresc" onclick="afegir(2.5)">
🥤<br>Refresc<br>2,50€
</button>

<button class="producte" id="cervesa" onclick="afegir(2.5)">
🍺<br>Cervesa<br>2,50€
</button>

<button class="producte" id="combinat" onclick="afegir(6)">
🍸<br>Combinat<br>6€
</button>

<button class="producte" id="ratafia" onclick="afegir(3.5)">
🍷<br>Ratafia<br>3,50€
</button>

<button class="producte" id="got" onclick="afegir(1)">
🥛<br>Got<br>1€
</button>

</div>

<div class="accions">

<button id="targeta" onclick="pagarTargeta()">
💳 TARGETA
</button>

<button id="efectiu" onclick="mostrarEfectiu()">
💶 EFECTIU
</button>

</div>

<button id="reset" onclick="reiniciar()">
🔄 REINICIAR
</button>

</div>

<div id="pantallaEfectiu">

<h1>Total</h1>

<div class="totalGran" id="total2"></div>

<input
type="number"
id="donen"
placeholder="Quant et donen?"
step="0.01">

<div class="rapids">

<button onclick="rapid(10)">10€</button>
<button onclick="rapid(20)">20€</button>
<button onclick="rapid(50)">50€</button>
<button onclick="rapid(100)">100€</button>

</div>

<button id="calcular" onclick="calcular()">
CALCULAR CANVI
</button>

<div id="canvi"></div>

<button id="nova" onclick="reiniciar()">
NOVA VENDA
</button>

</div>

<script>

let total=0;

function actualitzar(){
document.getElementById("total").innerHTML=total.toFixed(2)+" €";
}

function afegir(preu){
total+=preu;

if(navigator.vibrate){
navigator.vibrate(30);
}

actualitzar();
}

function reiniciar(){

total=0;

actualitzar();

document.getElementById("pantallaPrincipal").style.display="flex";
document.getElementById("pantallaEfectiu").style.display="none";

document.getElementById("donen").value="";
document.getElementById("canvi").innerHTML="";
}

function pagarTargeta(){

alert("Pagament correcte ✔");

reiniciar();

}

function mostrarEfectiu(){

document.getElementById("pantallaPrincipal").style.display="none";
document.getElementById("pantallaEfectiu").style.display="block";

document.getElementById("total2").innerHTML=total.toFixed(2)+" €";

}

function rapid(valor){

document.getElementById("donen").value=valor;

}

function calcular(){

let rebut=parseFloat(document.getElementById("donen").value);

if(isNaN(rebut)){
return;
}

let canvi=rebut-total;

document.getElementById("canvi").innerHTML=
"Canvi<br><br><b>"+canvi.toFixed(2)+" €</b>";

}

actualitzar();

</script>

</body>
</html>
