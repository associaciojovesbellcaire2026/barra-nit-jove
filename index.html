<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barra Nit Jove</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; user-select:none; }
    body { background:#111; color:white; overflow:hidden; }
    #pantallaPrincipal { display:flex; flex-direction:column; height:100vh; padding:10px; }
    
    /* Capçalera amb comptador */
    #header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    #total { font-size:40px; font-weight:bold; }
    #btnMenu { font-size:24px; padding:10px; background:#333; border-radius:10px; color:white; border:none; }

    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1; }
    .producte { border:none; border-radius:15px; font-size:20px; font-weight:bold; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
    .comptador { position:absolute; top:5px; right:10px; font-size:18px; background:rgba(0,0,0,0.3); padding:2px 8px; border-radius:10px; }
    .btn-minus { position:absolute; bottom:5px; left:10px; font-size:14px; background:rgba(0,0,0,0.3); border:none; color:white; padding:2px 5px; border-radius:5px; }

    /* Colors segons fitxes */
    .groc { background:#FFD700; color:black; }
    .blau { background:#2196F3; }
    .vermell { background:#D32F2F; }
    .verd { background:#4CAF50; }
    .rossa { background:#A1887F; }

    .accions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .accions button { height:60px; font-size:20px; border:none; border-radius:10px; font-weight:bold; }

    /* Pantalla Efectiu */
    #pantallaEfectiu { display:none; height:100vh; padding:20px; text-align:center; }
    .canvi-gran { font-size:60px; margin:20px 0; color:#4CAF50; }
    .btn-diners { height:60px; font-size:22px; margin:5px; border-radius:10px; border:none; width:22%; }
</style>
</head>
<body>

<div id="pantallaPrincipal">
    <div id="header">
        <div id="total">0,00 €</div>
        <button id="btnMenu" onclick="mostrarResum()">☰</button>
    </div>
    <div class="grid">
        <button class="producte groc" onclick="afegir(2.5, 'Cervesa')">CERVESA 🍺<br>2,50€<span class="comptador" id="cervesa-count">0</span><button class="btn-minus" onclick="event.stopPropagation(); restar(2.5, 'Cervesa')">-</button></button>
        <button class="producte groc" onclick="afegir(2.5, 'Refresc')">REFRESC 🥤<br>2,50€<span class="comptador" id="refresc-count">0</span><button class="btn-minus" onclick="event.stopPropagation(); restar(2.5, 'Refresc')">-</button></button>
        <button class="producte blau" onclick="afegir(1.5, 'Aigua')">AIGUA 💧<br>1,50€<span class="comptador" id="aigua-count">0</span><button class="btn-minus" onclick="event.stopPropagation(); restar(1.5, 'Aigua')">-</button></button>
        <button class="producte vermell" onclick="afegir(6, 'Combinat')">COMBINAT 🍸<br>6,00€<span class="comptador" id="combinat-count">0</span><button class="btn-minus" onclick="event.stopPropagation(); restar(6, 'Combinat')">-</button></button>
        <button class="producte verd" onclick="afegir(3.5, 'Ratafia')">RATAFIA 🍷<br>3,50€<span class="comptador" id="ratafia-count">0</span><button class="btn-minus" onclick="event.stopPropagation(); restar(3.5, 'Ratafia')">-</button></button>
        <button class="producte rossa" onclick="afegir(1, 'Got')">GOT 🥛<br>1,00€<span class="comptador" id="got-count">0</span><button class="btn-minus" onclick="event.stopPropagation(); restar(1, 'Got')">-</button></button>
    </div>
    <div class="accions">
        <button style="background:#4CAF50; color:white;" onclick="alert('Pagament Targeta OK')">TARGETA</button>
        <button style="background:#009688; color:white;" onclick="mostrarEfectiu()">EFECTIU</button>
    </div>
</div>

<div id="pantallaEfectiu">
    <h1>TOTAL: <span id="total-efectiu">0</span>€</h1>
    <div id="canvi-display" class="canvi-gran">Torna: 0,00 €</div>
    <div id="input-diners">
        <button class="btn-diners" onclick="afegirDiners(1)">1€</button>
        <button class="btn-diners" onclick="afegirDiners(2)">2€</button>
        <button class="btn-diners" onclick="afegirDiners(5)">5€</button>
        <button class="btn-diners" onclick="afegirDiners(10)">10€</button>
        <button class="btn-diners" onclick="afegirDiners(20)">20€</button>
        <button class="btn-diners" onclick="afegirDiners(50)">50€</button>
    </div>
    <button style="width:100%; height:60px; margin-top:20px; border-radius:10px;" onclick="reiniciar()">NOVA VENDA</button>
</div>

<script>
    let total = 0;
    let rebut = 0;
    let counts = {Cervesa:0, Refresc:0, Aigua:0, Combinat:0, Ratafia:0, Got:0};

    function afegir(preu, nom) {
        total += preu;
        counts[nom]++;
        actualitzar();
    }
    function restar(preu, nom) {
        if(total >= preu) {
            total -= preu;
            counts[nom] = Math.max(0, counts[nom]-1);
            actualitzar();
        }
    }
    function actualitzar() {
        document.getElementById("total").innerHTML = total.toFixed(2) + " €";
        for(let n in counts) document.getElementById(n.toLowerCase()+"-count").innerHTML = counts[n];
    }
    function mostrarEfectiu() {
        document.getElementById('pantallaPrincipal').style.display = 'none';
        document.getElementById('pantallaEfectiu').style.display = 'block';
        document.getElementById('total-efectiu').innerHTML = total.toFixed(2);
    }
    function afegirDiners(v) {
        rebut += v;
        let canvi = rebut - total;
        document.getElementById('canvi-display').innerHTML = "Torna: " + Math.max(0, canvi).toFixed(2) + " €";
    }
    function reiniciar() {
        total = 0; rebut = 0;
        for(let n in counts) counts[n] = 0;
        document.getElementById('pantallaPrincipal').style.display = 'flex';
        document.getElementById('pantallaEfectiu').style.display = 'none';
        actualitzar();
    }
    function mostrarResum() {
        let msg = "RESUM DE LA NIT:\n";
        for(let n in counts) msg += n + ": " + counts[n] + "\n";
        alert(msg);
    }
</script>
</body>
</html>
