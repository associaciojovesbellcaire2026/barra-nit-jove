<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Barra Nit Jove</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla Principal -->
    <div id="pantallaPrincipal">
        <div id="header">
            <div id="resum-venda"></div>
            <div id="total">0,00 €</div>
            <button id="btnMenu" onclick="mostrarResum()">☰</button>
        </div>

        <div class="grid" id="gridProductes">
            <!-- Els botons es generaran des del script -->
        </div>

        <div class="accions">
            <button id="btn-targeta" onclick="pagar('targeta')">💳 TARGETA</button>
            <button id="btn-efectiu" onclick="pagar('efectiu')">💶 EFECTIU</button>
        </div>
    </div>

    <!-- Pantalla Efectiu -->
    <div id="pantallaEfectiu" style="display:none;">
        <h1 id="total-efectiu">0,00 €</h1>
        <div id="canvi-display">Torna: 0,00 €</div>
        <div class="grid-diners">
            <button onclick="afegirDiners(0.50)">0,50€</button>
            <button onclick="afegirDiners(1)">1€</button>
            <button onclick="afegirDiners(2)">2€</button>
            <button onclick="afegirDiners(5)">5€</button>
            <button onclick="afegirDiners(10)">10€</button>
            <button onclick="afegirDiners(20)">20€</button>
            <button onclick="afegirDiners(50)">50€</button>
        </div>
        <button class="btn-finalitzar" onclick="finalitzarVenda()">FINALITZAR VENDA</button>
    </div>

    <!-- Pantalla Estadístiques (PIN) -->
    <div id="pantallaResum" style="display:none;">
        <button onclick="amagarResum()">⬅ Tornar</button>
        <div id="dades-resum"></div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
