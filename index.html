<div class="accions">
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT JOVE 26</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#111; color:white; height:100vh; display:flex; flex-direction:column; }
        #pantallaPrincipal { padding:10px; flex:1; display:flex; flex-direction:column; }
        #total { font-size:35px; font-weight:bold; margin-bottom:10px; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1; }
        .producte { border:none; border-radius:15px; font-size:16px; font-weight:bold; color:black; padding:10px; position:relative; height:90px; }
        .groc { background:#FFD700; } .blau { background:#2196F3; color:white; }
        .vermell { background:#D32F2F; color:white; } .verd { background:#4CAF50; color:white; }
        .rossa { background:rgb(205, 45, 115); color:white; }
        .comptador { position:absolute; top:5px; right:10px; font-size:18px; background:rgba(0,0,0,0.2); padding:2px 8px; border-radius:10px; }
        .btn-minus { position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.3); color:white; border:none; padding:5px 12px; border-radius:5px; }
        .accions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px; }
        .accions button { height:60px; border-radius:10px; border:none; font-weight:bold; }
        #pantallaEfectiu { display:none; padding:20px; text-align:center; }
        .input-diners { width:100%; height:50px; font-size:20px; text-align:center; margin:10px 0; }
    </style>
</head>
<body>

<div id="pantallaPrincipal">
    <div id="total">0.00 €</div>
    <div class="grid" id="gridProductes"></div>
    <div class="accions">
        <button onclick="reiniciar()">🔄</button>
        <button onclick="pagar('Targeta')">💳 Targeta</button>
        <button onclick="pagar('Efectiu')">💰 Efectiu</button>
    </div>
</div>

<div id="pantallaEfectiu">
    <h2 id="display-canvi">Total: 0.00€</h2>
    <input type="number" id="input-manual" class="input-diners" placeholder="Import rebut" oninput="calcularCanvi()">
    <button style="width:100%; height:50px; background:green; color:white; border:none; margin-bottom:10px;" onclick="alert('Venda registrada'); reiniciar(); tornar();">Finalitzar</button>
    <button style="width:100%; height:50px;" onclick="tornar()">🔙 Enrere</button>
</div>

<script>
    let total = 0;
    let productes = {
        'Cervesa 🍺': { preu: 2.5, count: 0, class: 'groc' },
        'Combinat 🍹': { preu: 6.0, count: 0, class: 'vermell' },
        'Got 🥤': { preu: 1.0, count: 0, class: 'rossa' },
        'Refresc 🥤': { preu: 2.5, count: 0, class: 'groc' },
        'Aigua 💧': { preu: 1.5, count: 0, class: 'blau' },
        'Ratafia 🥃': { preu: 3.5, count: 0, class: 'verd' }
    };

    function render() {
        const grid = document.getElementById('gridProductes');
        grid.innerHTML = '';
        for (let nom in productes) {
            let p = productes[nom];
            grid.innerHTML += `<button class="producte ${p.class}" onclick="afegir('${nom}')">
                ${nom} <span class="comptador">${p.count}</span>
                <button class="btn-minus" onclick="event.stopPropagation(); restar('${nom}')">-</button>
            </button>`;
        }
        document.getElementById("total").innerHTML = total.toFixed(2) + " €";
    }

    function afegir(nom) { total += productes[nom].preu; productes[nom].count++; render(); }
    function restar(nom) { if (productes[nom].count > 0) { total -= productes[nom].preu; productes[nom].count--; render(); } }
    function reiniciar() { total = 0; for(let n in productes) productes[n].count = 0; render(); }
    function pagar(tipus) {
        if (tipus === 'Targeta') { alert("Venda amb targeta registrada!"); reiniciar(); }
        else { document.getElementById('pantallaPrincipal').style.display = 'none'; document.getElementById('pantallaEfectiu').style.display = 'block'; }
    }
    function calcularCanvi() {
        let rebut = parseFloat(document.getElementById('input-manual').value) || 0;
        document.getElementById('display-canvi').innerHTML = `Total: ${total.toFixed(2)}€ | Torna: ${Math.max(0, rebut - total).toFixed(2)}€`;
    }
    function tornar() { document.getElementById('pantallaPrincipal').style.display = 'flex'; document.getElementById('pantallaEfectiu').style.display = 'none'; }
    render();
</script>
</body>
</html>
